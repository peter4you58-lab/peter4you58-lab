name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: devops-portfolio-app

jobs:
  deploy:
    name: 🚀 Deploy to k3s
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Download image tag artifact
        uses: actions/download-artifact@v4
        with:
          name: image-tag
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Read image tag
        id: read-tag
        run: echo "IMAGE_TAG=$(cat image_tag.txt)" >> $GITHUB_ENV

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up kubeconfig
        run: |
          echo "${{ secrets.K3S_KUBECONFIG_B64 }}" | base64 -d > /tmp/k3s-config.yaml
          echo "KUBECONFIG=/tmp/k3s-config.yaml" >> $GITHUB_ENV

      - name: Create ECR pull secret
        run: |
          kubectl create secret docker-registry ecr-registry \
            --docker-server=${{ steps.login-ecr.outputs.registry }} \
            --docker-username=AWS \
            --docker-password=$(aws ecr get-login-password --region $AWS_REGION) \
            --dry-run=client -o yaml | kubectl apply -f -

      - uses: azure/setup-helm@v3
        with:
          version: v3.12.0

      - name: Helm deploy
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          helm upgrade --install myapp ./helm/myapp \
            --set image.repository=$ECR_REGISTRY/$ECR_REPOSITORY \
            --set image.tag=$IMAGE_TAG \
            --set image.pullPolicy=Always \
            --set imagePullSecrets[0].name=ecr-registry \
            --atomic --timeout 3m

      - name: Verify rollout
        run: kubectl rollout status deployment/myapp --timeout=120s

      - name: Notify Slack on success
        if: success()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {"text": "✅