grafana:
  enabled: true

  # adminPassword must NOT be set here — pull from a Kubernetes Secret instead.
  # Create the secret before deploying:
  #   kubectl create secret generic grafana-admin-secret \
  #     --from-literal=admin-password='<your-password>' \
  #     -n monitoring
  adminPassword: ""
  admin:
    existingSecret: grafana-admin-secret
    userKey: admin-user
    passwordKey: admin-password

  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: "default"
          orgId: 1
          folder: ""
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default

  persistence:
    enabled: true
    size: 5Gi

prometheus:
  prometheusSpec:
    retention: 15d
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

alertmanager:
  config:
    global:
      # Slack webhook URL is read from a Kubernetes Secret.
      # Create it before deploying:
      #   kubectl create secret generic alertmanager-slack-secret \
      #     --from-literal=slack_api_url='https://hooks.slack.com/services/...' \
      #     -n monitoring
      # Then reference it via alertmanager.alertmanagerSpec.secrets below.
    route:
      group_by: ["alertname", "namespace"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: "slack-notifications"
    receivers:
      - name: "slack-notifications"
        slack_configs:
          - api_url_secret:
              name: alertmanager-slack-secret
              key: slack_api_url
            channel: "#devops-alerts"
            send_resolved: true
            title: '{{ .GroupLabels.alertname }}'
            text: >-
              {{ range .Alerts }}
                *Alert:* {{ .Annotations.summary }}
                *Description:* {{ .Annotations.description }}
                *Severity:* {{ .Labels.severity }}
              {{ end }}

  alertmanagerSpec:
    secrets:
      - alertmanager-slack-secret

additionalPrometheusRulesMap:
  app-alerts:
    groups:
      - name: app.rules
        rules:
          - alert: AppHighErrorRate
            expr: rate(flask_http_request_total{status=~"5.."}[5m]) > 0.1
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "High error rate detected"
              description: "HTTP 5xx error rate is above 10% for 2+ minutes"

          - alert: PodCrashLooping
            expr: rate(kube_pod_container_status_restarts_total[15m]) > 0
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Pod crash looping"
              description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} is crash looping"

          - alert: HighMemoryUsage
            expr: container_memory_working_set_bytes{namespace="production"} / container_spec_memory_limit_bytes > 0.85
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High memory usage"
              description: "Container {{ $labels.container }} is using >85% of its memory limit"
